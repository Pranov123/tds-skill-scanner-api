services:
  - type: web
    name: skill-scanner-endpoint
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: "openai/gpt-oss-20b"
      - key: GROQ_TIMEOUT_SECONDS
        value: "6"